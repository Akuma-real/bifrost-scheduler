services:
  bifrost-scheduler:
    image: ghcr.io/akuma-real/bifrost-scheduler:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 可选 Telegram 通知。真实值放在 .env 里。
      # BIFROST_SCHEDULER_TG_BOT_TOKEN: ${BIFROST_SCHEDULER_TG_BOT_TOKEN:-}
      # BIFROST_SCHEDULER_TG_CHAT_ID: ${BIFROST_SCHEDULER_TG_CHAT_ID:-}
      # BIFROST_SCHEDULER_TG_THREAD_ID: ${BIFROST_SCHEDULER_TG_THREAD_ID:-}
    volumes:
      - ./config.json:/app/config.json:ro
      - ./logs:/app/logs
    command:
      - daemon
      - --config
      - /app/config.json
      - --interval
      - 5m
      # Add --apply only when config.json mode is guarded_write.
      # - --apply
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "3"
